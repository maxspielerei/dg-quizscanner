name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Projekt herunterladen
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Projektdateien erzeugen
        run: bash setup.sh

      - name: Gradle Wrapper JAR herunterladen
        run: |
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: APK bauen
        run: ./gradlew assembleDebug --no-daemon

      - name: APK bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: QuizScanner-APK
          path: app/build/outputs/apk/debug/app-debug.apk
