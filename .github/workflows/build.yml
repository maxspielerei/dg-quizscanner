name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Projekt herunterladen
        uses: actions/checkout@v4

      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Projektdateien erzeugen
        run: bash setup.sh

      - name: Gradle Wrapper installieren
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-7.5/bin/gradle wrapper --gradle-version 7.5 --distribution-type bin
          chmod +x gradlew

      - name: APK bauen
        run: ./gradlew assembleDebug --no-daemon

      - name: APK bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: app/build/outputs/apk/debug/app-debug.apk
